<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
    <meta name="app-url" content="http://localhost:8080" />
    <title>Gallery | Camagru</title>
    <link rel="stylesheet" href="/public/css/main.css" />
    <link rel="stylesheet" href="/public/css/gallery.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container nav-wrap">
          <a class="brand" href="/gallery">
            <span class="brand-logo-wrap">
              <img
                src="/public/assets/camagru-logo.png"
                alt="Camagru Logo"
                class="logo"
              />
            </span>
          </a>
          <input id="nav-toggle" class="nav-toggle" type="checkbox" />
          <label
            class="nav-toggle-label"
            for="nav-toggle"
            aria-label="Toggle navigation"
          >
            Menu
          </label>
          <nav class="site-nav">{{NAV_AUTH}}</nav>
        </div>
      </header>

      <main class="page-main">
        <div class="container">
          <section class="hero">
            <h1>Capture. Overlay. Share.</h1>
            <p>
              Create expressive photos with overlays and share them with the
              Camagru community in one streamlined workflow.
            </p>
          </section>

          {{AUTH_HINT}}

          <section class="gallery-head">
            <p>{{PAGE_INFO}}</p>
          </section>

          <section
            id="galleryGrid"
            class="gallery-grid"
            data-current-page="{{CURRENT_PAGE}}"
            data-total-pages="{{TOTAL_PAGES}}"
            data-can-interact="{{CAN_INTERACT}}"
          >
            {{IMAGES}}
          </section>

          <div
            id="scroll-sentinel"
            class="scroll-sentinel"
            aria-hidden="true"
          ></div>

          <template id="share-buttons-template">
            <div class="share-row" data-image-id="{{IMAGE_ID}}">
              <button
                class="share-btn share-btn-x"
                type="button"
                data-share-target="x"
                data-image-id="{{IMAGE_ID}}"
              >
                Share on X
              </button>
              <button
                class="share-btn share-btn-facebook"
                type="button"
                data-share-target="facebook"
                data-image-id="{{IMAGE_ID}}"
              >
                Share on Facebook
              </button>
              <button
                class="share-btn share-btn-whatsapp"
                type="button"
                data-share-target="whatsapp"
                data-image-id="{{IMAGE_ID}}"
              >
                Share on WhatsApp
              </button>
            </div>
          </template>
        </div>
      </main>

      <footer class="site-footer">
        <p>Camagru © 2025</p>
      </footer>
    </div>

    <script src="/public/js/gallery.js" defer></script>
  </body>
</html>
