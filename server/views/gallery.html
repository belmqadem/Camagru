<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
    <meta name="app-url" content="http://localhost:8080" />
    <link
      rel="icon"
      type="image/png"
      href="/public/assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/public/assets/favicon/favicon.svg"
    />
    <link rel="shortcut icon" href="/public/assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/public/assets/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="/public/assets/favicon/site.webmanifest" />
    <title>Gallery | Camagru</title>
    <link rel="stylesheet" href="/public/assets/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/public/css/main.css" />
    <link rel="stylesheet" href="/public/css/gallery.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container nav-wrap">
          <a class="brand" href="/gallery">
            <span class="brand-logo-wrap">
              <img
                src="/public/assets/camagru-logo.png"
                alt="Camagru Logo"
                class="logo"
              />
            </span>
          </a>
          <nav class="site-nav">{{NAV_AUTH}}</nav>
        </div>
      </header>

      <main class="page-main">
        <div class="container feed-shell">
          {{AUTH_HINT}}

          <section
            id="galleryGrid"
            class="gallery-feed"
            data-current-page="{{CURRENT_PAGE}}"
            data-total-pages="{{TOTAL_PAGES}}"
            data-can-interact="{{CAN_INTERACT}}"
          >
            {{IMAGES}}
          </section>

          <div
            id="scroll-sentinel"
            class="scroll-sentinel"
            aria-hidden="true"
          ></div>

          <template id="share-buttons-template">
            <div class="share-row" data-image-id="{{IMAGE_ID}}">
              <button
                class="share-btn share-btn-x"
                type="button"
                data-share-target="x"
                data-image-id="{{IMAGE_ID}}"
                aria-label="Share on X"
              >
                <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
                <span class="sr-only">Share on X</span>
              </button>
              <button
                class="share-btn share-btn-facebook"
                type="button"
                data-share-target="facebook"
                data-image-id="{{IMAGE_ID}}"
                aria-label="Share on Facebook"
              >
                <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
                <span class="sr-only">Share on Facebook</span>
              </button>
              <button
                class="share-btn share-btn-whatsapp"
                type="button"
                data-share-target="whatsapp"
                data-image-id="{{IMAGE_ID}}"
                aria-label="Share on WhatsApp"
              >
                <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
                <span class="sr-only">Share on WhatsApp</span>
              </button>
            </div>
          </template>
        </div>
      </main>

      <footer class="site-footer">
        <p>Camagru © 2025</p>
      </footer>
    </div>

    <script src="/public/js/gallery.js" defer></script>
  </body>
</html>
