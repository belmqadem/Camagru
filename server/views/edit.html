<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
    <title>Edit | Camagru</title>
    <link rel="stylesheet" href="/public/css/main.css" />
    <link rel="stylesheet" href="/public/css/edit.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container nav-wrap">
          <a class="brand" href="/gallery">
            <span class="brand-logo-wrap">
              <img
                src="/public/assets/camagru-logo.png"
                alt="Camagru Logo"
                class="logo"
              />
            </span>
          </a>
          <input id="nav-toggle" class="nav-toggle" type="checkbox" />
          <label
            class="nav-toggle-label"
            for="nav-toggle"
            aria-label="Toggle navigation"
          >
            Menu
          </label>
          <nav class="site-nav">{{NAV_AUTH}}</nav>
        </div>
      </header>

      <main class="page-main">
        <div class="container">
          <section class="edit-intro">
            <h1>Edit Studio</h1>
            <p>Create and save your montage, {{USERNAME}}.</p>
          </section>

          <div class="edit-layout">
            <section class="panel editor-panel">
              <h2>Capture</h2>
              <div class="capture-stage">
                <div class="camera-wrap">
                  <video id="camera" autoplay playsinline muted></video>
                  <img
                    id="uploadedPhotoPreview"
                    alt="Selected photo preview"
                    hidden
                  />
                  <img id="liveOverlayPreview" alt="Live overlay preview" />
                </div>
                <div id="fallbackUpload" class="fallback-upload" hidden>
                  <label for="fileInput"
                    >Webcam not available. Upload an image instead:</label
                  >
                  <input
                    id="fileInput"
                    type="file"
                    accept="image/jpeg,image/png"
                  />
                </div>
              </div>

              <canvas id="captureCanvas" hidden></canvas>

              <div class="controls">
                <button id="captureButton" class="btn capture-btn" disabled>
                  Capture With Selected Overlay
                </button>
              </div>

              <div
                id="overlayTransformControls"
                class="overlay-transform-controls"
                hidden
              >
                <div class="row">
                  <label for="overlayScale">Overlay size</label>
                  <span id="overlayScaleValue">100%</span>
                </div>
                <input
                  id="overlayScale"
                  type="range"
                  min="0.2"
                  max="2"
                  step="0.01"
                  value="1"
                />
                <div class="row">
                  <span class="hint"
                    >Drag the overlay directly on the camera to move it.</span
                  >
                  <button id="overlayResetButton" type="button">Reset</button>
                </div>
              </div>

              <p id="statusMessage" class="status" aria-live="polite"></p>

              <div class="overlay-picker">
                <h2>Overlays</h2>
                <div id="overlayList" class="overlay-strip">
                  {{OVERLAY_ITEMS}}
                </div>
              </div>
            </section>

            <aside class="panel history-panel">
              <h2>Your Images</h2>
              <div id="userImages" class="history-list">{{USER_IMAGES}}</div>
            </aside>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <p>Camagru © 2025</p>
      </footer>
    </div>

    <div id="imagePreviewModal" class="image-preview-modal" hidden>
      <div class="image-preview-backdrop" data-close-preview="true"></div>
      <div
        class="image-preview-dialog"
        role="dialog"
        aria-modal="true"
        aria-label="Expanded image preview"
      >
        <button
          id="closeImagePreviewButton"
          type="button"
          class="close-preview-btn"
          aria-label="Close expanded image"
        >
          ×
        </button>
        <img id="imagePreviewContent" alt="Expanded photo preview" />
      </div>
    </div>

    <script src="/public/js/editor.js" defer></script>
  </body>
</html>
