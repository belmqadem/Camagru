<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
    <title>Edit | Camagru</title>
    <style>
      :root {
        --bg: #f8f6f1;
        --bg-accent: #efe6d8;
        --surface: #ffffff;
        --surface-2: #fffaf2;
        --line: #d9cdb8;
        --text: #2b2216;
        --muted: #6b5c49;
        --primary: #1e6f5c;
        --primary-hover: #165747;
        --danger: #b83f3f;
        --danger-hover: #8f3030;
        --shadow: 0 14px 28px rgba(43, 34, 22, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 10% -10%,
            var(--bg-accent) 0%,
            transparent 55%
          ),
          radial-gradient(circle at 90% 0%, #eadfce 0%, transparent 45%),
          var(--bg);
      }

      .page {
        width: min(1200px, calc(100% - 28px));
        margin: 18px auto 34px;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .title-block h1 {
        margin: 0;
        font-size: 30px;
      }

      .title-block p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .topbar-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .topbar-actions a,
      .logout-btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        color: var(--text);
        background: var(--surface-2);
        text-decoration: none;
        font: inherit;
      }

      .topbar-actions a:hover,
      .logout-btn:hover {
        border-color: #c4b394;
      }

      .layout {
        margin-top: 14px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .editor-panel {
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .capture-stage {
        border: 1px dashed var(--line);
        border-radius: 12px;
        background: #f2ede4;
        min-height: 340px;
        padding: 10px;
        display: grid;
        place-items: center;
      }

      #camera {
        max-width: 100%;
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        display: block;
      }

      .fallback-upload {
        width: 100%;
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      .fallback-upload input {
        width: 100%;
      }

      .controls {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .capture-btn {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font: inherit;
        padding: 10px 14px;
        min-width: 170px;
      }

      .capture-btn:hover {
        background: var(--primary-hover);
      }

      .capture-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        min-height: 20px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .overlay-picker {
        margin-top: 14px;
      }

      .overlay-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .overlay-item {
        border: 2px solid transparent;
        border-radius: 10px;
        background: #f5ede0;
        padding: 4px;
        width: 100%;
      }

      .overlay-item:hover {
        border-color: #bba789;
      }

      .overlay-item.selected {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(30, 111, 92, 0.2);
      }

      .overlay-item img {
        width: 100%;
        height: 90px;
        object-fit: contain;
        display: block;
      }

      .history-panel {
        padding: 14px;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .user-image-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
        padding: 8px;
      }

      .user-image-card img {
        width: 100%;
        height: 112px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--line);
        display: block;
      }

      .user-image-meta {
        margin-top: 7px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .user-image-meta span {
        color: var(--muted);
        font-size: 12px;
      }

      .delete-image-btn {
        border: 0;
        border-radius: 8px;
        padding: 6px 9px;
        background: var(--danger);
        color: #fff;
        font: inherit;
        font-size: 12px;
      }

      .delete-image-btn:hover {
        background: var(--danger-hover);
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .history-panel {
          order: 2;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="title-block">
          <h1>Edit Studio</h1>
          <p>Create and save your montage, {{USERNAME}}.</p>
        </div>
        <div class="topbar-actions">
          <a href="/gallery">Gallery</a>
          <form action="/logout" method="POST">
            <input type="hidden" name="_csrf" value="{{CSRF_TOKEN}}" />
            <button type="submit" class="logout-btn">Logout</button>
          </form>
        </div>
      </header>

      <main class="layout">
        <section class="panel editor-panel">
          <h2>Capture</h2>
          <div class="capture-stage">
            <video id="camera" autoplay playsinline muted></video>
            <div id="fallbackUpload" class="fallback-upload" hidden>
              <label for="fileInput"
                >Webcam not available. Upload an image instead:</label
              >
              <input id="fileInput" type="file" accept="image/jpeg,image/png" />
            </div>
          </div>

          <canvas id="captureCanvas" hidden></canvas>

          <div class="controls">
            <button id="captureButton" class="capture-btn" disabled>
              Capture With Selected Overlay
            </button>
          </div>

          <p id="statusMessage" class="status" aria-live="polite"></p>

          <div class="overlay-picker">
            <h2>Overlays</h2>
            <div id="overlayList" class="overlay-grid">{{OVERLAY_ITEMS}}</div>
          </div>
        </section>

        <aside class="panel history-panel">
          <h2>Your Images</h2>
          <div id="userImages" class="history-list">{{USER_IMAGES}}</div>
        </aside>
      </main>
    </div>

    <script src="/public/js/editor.js" defer></script>
  </body>
</html>
