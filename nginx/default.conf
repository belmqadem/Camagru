server {
  listen 80;
  client_max_body_size 8m;

  # Serve static files directly
  location /public/ {
    root /var/www;
    try_files $uri =404;
  }

  # Proxy everything else to Express
  location / {
    proxy_pass http://app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
